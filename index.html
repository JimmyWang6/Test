<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>网页版五子棋</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: #e0e0e0;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      letter-spacing: 4px;
      color: #f0c040;
      text-shadow: 0 2px 8px rgba(240,192,64,.5);
    }

    #status-bar {
      margin-bottom: 14px;
      font-size: 1.1rem;
      min-height: 1.6em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #player-indicator {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #999;
      display: inline-block;
    }

    #player-indicator.black { background: radial-gradient(circle at 35% 35%, #777, #111); border-color: #555; }
    #player-indicator.white { background: radial-gradient(circle at 35% 35%, #fff, #ccc); border-color: #aaa; }

    #canvas-wrapper {
      position: relative;
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }

    canvas {
      display: block;
      cursor: crosshair;
      border-radius: 6px;
    }

    #buttons {
      display: flex;
      gap: 20px;
      margin-top: 18px;
    }

    button {
      padding: 10px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform .1s, box-shadow .1s;
      font-family: inherit;
    }
    button:active { transform: scale(.96); }

    #btn-undo {
      background: #3a3a5c;
      color: #ccc;
      border: 1px solid #555;
    }
    #btn-undo:hover { background: #4a4a7c; }

    #btn-restart {
      background: #f0c040;
      color: #1a1a2e;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(240,192,64,.4);
    }
    #btn-restart:hover { background: #f5d060; }
  </style>
</head>
<body>
  <h1>五子棋</h1>

  <div id="status-bar">
    <span id="player-indicator" class="black"></span>
    <span id="status-text">黑棋先手，请落子</span>
  </div>

  <div id="canvas-wrapper">
    <canvas id="board"></canvas>
  </div>

  <div id="buttons">
    <button id="btn-undo">悔棋</button>
    <button id="btn-restart">重新开始</button>
  </div>

  <script>
    // ─── Constants ────────────────────────────────────────────────────────────
    const BOARD_SIZE = 15;
    const CELL       = 40;
    const PAD        = 40;
    const CANVAS_SIZE = CELL * (BOARD_SIZE - 1) + PAD * 2;
    const STONE_R    = CELL * 0.44;

    // Star-point positions (row, col)
    const STARS = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];

    // ─── Local UI State (mirror of server state) ─────────────────────────────
    let gameId       = null;
    let board        = [];
    let currentPlayer = 1;
    let gameOver     = false;
    let winningCells = [];
    let hoverCell    = null;
    let busy         = false;  // prevent double-clicks during fetch

    // ─── Canvas Setup ─────────────────────────────────────────────────────────
    const canvas = document.getElementById('board');
    const ctx    = canvas.getContext('2d');
    canvas.width  = CANVAS_SIZE;
    canvas.height = CANVAS_SIZE;

    // ─── API Layer ────────────────────────────────────────────────────────────
    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res  = await fetch(path, opts);
      return res.json();
    }

    // ─── State Sync ───────────────────────────────────────────────────────────
    function applyState(data) {
      gameId        = data.id;
      board         = data.board;
      currentPlayer = data.currentPlayer;
      winningCells  = data.winningCells || [];
      gameOver      = data.status !== 'playing';
      updateStatus(data.status, data.winner);
      render();
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function cellToXY(row, col) {
      return { x: PAD + col * CELL, y: PAD + row * CELL };
    }

    function xyToCell(x, y) {
      const col = Math.round((x - PAD) / CELL);
      const row = Math.round((y - PAD) / CELL);
      if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) return { row, col };
      return null;
    }

    // ─── Rendering ────────────────────────────────────────────────────────────
    function drawBoard() {
      ctx.fillStyle = '#DCB47C';
      ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      ctx.strokeStyle = '#8B6914';
      ctx.lineWidth   = 1;
      for (let i = 0; i < BOARD_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(PAD + i * CELL, PAD);
        ctx.lineTo(PAD + i * CELL, PAD + (BOARD_SIZE - 1) * CELL);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(PAD, PAD + i * CELL);
        ctx.lineTo(PAD + (BOARD_SIZE - 1) * CELL, PAD + i * CELL);
        ctx.stroke();
      }

      ctx.fillStyle = '#5C3D0A';
      for (const [r, c] of STARS) {
        const { x, y } = cellToXY(r, c);
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
      }

      if (gameOver && winningCells.length) {
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
      }
    }

    function drawStone(row, col, player, alpha = 1) {
      const { x, y } = cellToXY(row, col);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(x, y);

      const grad = ctx.createRadialGradient(-STONE_R * 0.3, -STONE_R * 0.3, STONE_R * 0.1, 0, 0, STONE_R);
      if (player === 1) {
        grad.addColorStop(0, '#888');
        grad.addColorStop(1, '#111');
      } else {
        grad.addColorStop(0, '#fff');
        grad.addColorStop(1, '#bbb');
      }

      ctx.beginPath();
      ctx.arc(0, 0, STONE_R, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    }

    function drawWinHighlight() {
      for (const { row, col } of winningCells) {
        const { x, y } = cellToXY(row, col);
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, STONE_R + 4, 0, Math.PI * 2);
        ctx.strokeStyle = '#FF4444';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();
      }
    }

    function render() {
      drawBoard();
      for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
          if (board[r] && board[r][c]) drawStone(r, c, board[r][c]);
        }
      }
      if (gameOver && winningCells.length) drawWinHighlight();
      if (!gameOver && hoverCell && board[hoverCell.row] && board[hoverCell.row][hoverCell.col] === 0) {
        drawStone(hoverCell.row, hoverCell.col, currentPlayer, 0.35);
      }
    }

    // ─── Status Bar ───────────────────────────────────────────────────────────
    function updateStatus(status, winner) {
      const indicator = document.getElementById('player-indicator');
      const text      = document.getElementById('status-text');
      if (status === 'black_win') {
        indicator.className = 'black';
        text.textContent    = '黑棋 获胜！🎉';
      } else if (status === 'white_win') {
        indicator.className = 'white';
        text.textContent    = '白棋 获胜！🎉';
      } else if (status === 'draw') {
        indicator.className = '';
        text.textContent    = '平局！';
      } else {
        indicator.className = currentPlayer === 1 ? 'black' : 'white';
        text.textContent    = (currentPlayer === 1 ? '黑棋' : '白棋') + ' 落子中…';
      }
    }

    // ─── Event Handlers ───────────────────────────────────────────────────────
    canvas.addEventListener('click', async e => {
      if (gameOver || busy || !gameId) return;
      const rect = canvas.getBoundingClientRect();
      const cell = xyToCell(
        (e.clientX - rect.left) * (canvas.width  / rect.width),
        (e.clientY - rect.top)  * (canvas.height / rect.height)
      );
      if (!cell) return;
      busy = true;
      const res = await api('POST', `/api/games/${gameId}/move`, { row: cell.row, col: cell.col });
      busy = false;
      if (res.success) applyState(res.data);
    });

    canvas.addEventListener('mousemove', e => {
      if (gameOver) return;
      const rect = canvas.getBoundingClientRect();
      const cell = xyToCell(
        (e.clientX - rect.left) * (canvas.width  / rect.width),
        (e.clientY - rect.top)  * (canvas.height / rect.height)
      );
      hoverCell = cell;
      render();
    });

    canvas.addEventListener('mouseleave', () => { hoverCell = null; render(); });

    document.getElementById('btn-undo').addEventListener('click', async () => {
      if (busy || !gameId) return;
      busy = true;
      const res = await api('POST', `/api/games/${gameId}/undo`);
      busy = false;
      if (res.success) applyState(res.data);
    });

    document.getElementById('btn-restart').addEventListener('click', async () => {
      if (busy || !gameId) return;
      busy = true;
      const res = await api('POST', `/api/games/${gameId}/reset`);
      busy = false;
      if (res.success) applyState(res.data);
    });

    // ─── Bootstrap ────────────────────────────────────────────────────────────
    (async () => {
      const res = await api('POST', '/api/games');
      if (res.success) {
        applyState(res.data);
      } else {
        // Fallback: render empty board if server unavailable
        board = Array.from({ length: BOARD_SIZE }, () => new Array(BOARD_SIZE).fill(0));
        render();
      }
    })();
  </script>
</body>
</html>
